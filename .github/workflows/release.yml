name: Build & Release Signed APK

on:
  push:
    tags:
      - 'v*'          # triggers on any tag like v1.0, v1.2.3

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permissions ────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Decode keystore from secret ───────────────────────────────────────
      # Store your keystore as a Base64-encoded GitHub Secret named KEYSTORE_BASE64
      # Generate with: base64 -w 0 your-release-key.jks > keystore.b64
      # Then copy the output into the GitHub Secret.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks

      # ── 5. Build signed release APK ──────────────────────────────────────────
      - name: Build Signed Release APK
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Rename APK with version tag ───────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/LNCT-Attendance-${VERSION}.apk

      # ── 7. Create GitHub Release & upload APK ────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LNCT Attendance ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## LNCT Attendance ${{ github.ref_name }}

            ### What's new
            - See commit history for changes in this release.

            ### Install
            Download the APK below and install it on your Android device.
            Enable **"Install from unknown sources"** in Settings if prompted.

            > Minimum Android version: **8.0 (Oreo)**
          files: app/build/outputs/apk/release/LNCT-Attendance-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Clean up keystore ─────────────────────────────────────────────────
      - name: Delete keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks
